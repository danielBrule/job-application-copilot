name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.12 on Windows
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install "poetry==2.4.1"

      - name: Install project
        shell: powershell
        run: .\dev.ps1 env

      - name: Run tests
        shell: powershell
        run: .\dev.ps1 test

      - name: Run lint and formatting checks
        shell: powershell
        run: .\dev.ps1 lint
